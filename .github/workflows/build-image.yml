name: Gjenbrukbar workflow for docker image

on:
  workflow_call:
    inputs:
      ref:
        description: 'symbolic ref pointing to the commit to build'
        type: string
        default: ${{ github.sha }}
        required: false
      module:
        description: 'gradle module to build the distribution for'
        type: string
        required: true
      dockerfile:
        description: 'dockerfile to build'
        type: string
        required: true
      image_suffix:
        description: 'suffix to append to docker image'
        type: string
        required: true

    outputs:
      image:
        description: "Navn på imaget som ble bygget"
        value: ${{ jobs.build.outputs.image }}

jobs:
  build:
    permissions:
      contents: read
      id-token: write
      packages: read
    name: Build image
    runs-on: ubuntu-latest-16-cores
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Gradle build
        run: ./gradlew build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Gradle installDist
        run: ./gradlew :${{ inputs.module }}:installDist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: nais/docker-build-push@31c3a7321909bcb20799fdf46153fec721fd9512 # v0
        id: docker-build-push
        # Lagt til env-vars for å bøte på hyppig byggfeil av typen "Fatal error	image scan error: scan error: scan failed:..."
        # Kan (forhåpentligvis) sjekke status i denne tråden: https://nav-it.slack.com/archives/C5KUST8N6/p1727721373573999?thread_ts=1727082677.061639&cid=C5KUST8N6
        env:
          TRIVY_JAVA_DB_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-java-db:1"
        with:
          team: tbd
          tag: ${{ inputs.ref }}
          dockerfile: ${{ inputs.dockerfile }}
          image_suffix: ${{ inputs.image_suffix }}

apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: spesialist
  namespace: tbd
  labels:
    team: tbd
spec:
  image: {{image}}
  port: 8080
  ingresses:
    - https://spesialist.intern.dev.nav.no
  strategy:
    type: Recreate
  startup:
    path: isready
    initialDelay: 20
    periodSeconds: 5
    failureThreshold: 9
  liveness:
    path: isalive
  readiness:
    path: isready
  preStopHook:
    http:
      path: /stop
  resources:
    limits:
      memory: 640Mi
    requests:
      cpu: 20m
      memory: 512Mi
  replicas:
    min: 2
    max: 3
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
    logging:
      destinations:
        - id: elastic
        - id: loki
  prometheus:
    enabled: true
    path: /metrics
  kafka:
    pool: nav-dev
  azure:
    application:
      enabled: true
      tenant: trygdeetaten.no
      claims:
        extra:
          - "NAVident"
        groups:
          - id: {{ENTRAID_UUID_KODE_7_DEV}}
          - id: {{ENTRAID_UUID_SPEIL_BESLUTTERE_DEV}}
          - id: {{ENTRAID_UUID_SPEIL_SAKSBEHANDLER_DEV}}
          - id: {{ENTRAID_UUID_SPEIL_STIKKPROVE_DEV}}
          - id: {{ENTRAID_UUID_SPEIL_LESETILGANG_DEV}}
  accessPolicy:
    inbound:
      rules:
        - application: speil
          cluster: dev-gcp
    outbound:
      rules:
        - application: spleis-api
          namespace: tbd
          cluster: dev-gcp
        - application: sp-forsikring
          namespace: tbd
          cluster: dev-gcp
        - application: speed-api
          namespace: tbd
          cluster: dev-gcp
        - application: digdir-krr-proxy
          namespace: team-rocket
          cluster: dev-gcp
        - application: sparkel-norg
          namespace: tbd
          cluster: dev-gcp
        - application: logging
          namespace: nais-system
        - application: populasjonstilgangskontroll
          namespace: tilgangsmaskin
      external:
        - host: sykepengeperioder-api.dev-fss-pub.nais.io
  gcp:
    permissions:
      - resource:
          apiVersion: resourcemanager.cnrm.cloud.google.com/v1beta1
          kind: Project
        role: roles/cloudprofiler.agent
    sqlInstances:
      - type: POSTGRES_17
        diskAutoresize: true
        tier: db-f1-micro
        flags:
          - name: cloudsql.enable_pgaudit
            value: "true"
          - name: pgaudit.log
            value: 'write'
        databases:
          - name: spesialist
            envVarPrefix: DATABASE
            users:
              - name: spesialist-db-migrations
              - name: spesialist-opprydding-dev
  valkey:
    - instance: spesialist-cache
      access: readwrite
    - instance: personpseudoid
      access: readwrite
  env:
    - name: KAFKA_RAPID_TOPIC
      value: tbd.rapid.v1
    - name: KAFKA_CONSUMER_GROUP_ID
      value: tbd-spesialist-v1
    - name: KAFKA_EXTRA_TOPIC
      value: tbd.sis
    - name: TILGANG_SKRIV
      value: {{ENTRAID_UUID_SPEIL_SAKSBEHANDLER_DEV}}
    - name: TILGANG_LES
      value: {{ENTRAID_UUID_SPEIL_LESETILGANG_DEV}}
    - name: ROLLE_BESLUTTER
      value: {{ENTRAID_UUID_SPEIL_BESLUTTERE_DEV}},{{ENTRAID_UUID_SPEIL_SAKSBEHANDLER_DEV}}
    - name: ROLLE_EGEN_ANSATT
      value: {{ENTRAID_UUID_SPEIL_SAKSBEHANDLER_DEV}}
    - name: ROLLE_KODE_7
      value: {{ENTRAID_UUID_KODE_7_DEV}}
    - name: ROLLE_STIKKPROVE
      value: {{ENTRAID_UUID_SPEIL_STIKKPROVE_DEV}}
    - name: ROLLE_SELVSTENDIG_BETA
      value: {{ENTRAID_UUID_SPEIL_SAKSBEHANDLER_DEV}}
    - name: ROLLE_UTVIKLER
      value: {{ENTRAID_UUID_SPEIL_SAKSBEHANDLER_DEV}}
    - name: ROLLE_DIALOGMELDING
      value: {{ENTRAID_UUID_SPEIL_SAKSBEHANDLER_DEV}}
    - name: SPLEIS_CLIENT_ID
      value: api://dev-gcp.tbd.spleis-api/.default
    - name: SPLEIS_API_URL
      value: "http://spleis-api"
    - name: SPLEIS_CLIENT_LOGG_RESPONS
      value: "true"
    - name: KONTAKT_OG_RESERVASJONSREGISTERET_API_URL
      value: "http://digdir-krr-proxy.team-rocket.svc.cluster.local"
    - name: KONTAKT_OG_RESERVASJONSREGISTERET_SCOPE
      value: "api://dev-gcp.team-rocket.digdir-krr-proxy/.default"
    - name: SP_FORSIKRING_API_URL
      value: "http://sp-forsikring"
    - name: SP_FORSIKRING_SCOPE
      value: "api://dev-gcp.tbd.sp-forsikring/.default"
    - name: SPEED_API_URL
      value: "http://speed-api"
    - name: SPEED_SCOPE
      value: "api://dev-gcp.tbd.speed-api/.default"
    - name: SPARKEL_NORG_API_URL
      value: "http://sparkel-norg"
    - name: SPARKEL_NORG_SCOPE
      value: "api://dev-gcp.tbd.sparkel-norg/.default"
    - name: SPARKEL_SYKEPENGEPERIODER_API_URL
      value: "https://sykepengeperioder-api.dev-fss-pub.nais.io"
    - name: SPARKEL_SYKEPENGEPERIODER_SCOPE
      value: "api://dev-fss.tbd.sparkel-sykepengeperioder-api/.default"
    - name: TILGANGSMASKINEN_BASE_URL
      value: "http://populasjonstilgangskontroll.tilgangsmaskin"
    - name: TILGANGSMASKINEN_SCOPE
      value: "api://dev-gcp.tilgangsmaskin.populasjonstilgangskontroll/.default"
    - name: TILLAT_GODKJENNING_UTEN_BESLUTTERTILGANG
      value: "true"
    - name: TILLAT_GODKJENNING_AV_EGEN_SAK
      value: "true"
    - name: IGNORER_MELDINGER_FOR_UKJENTE_PERSONER
      value: "true"
    - name: TILLAT_SE_FORSIKRING
      value: "true"
    - name: EKSPONER_OPENAPI
      value: "true"
